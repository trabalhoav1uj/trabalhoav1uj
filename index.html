<!DOCTYPE html>
<html lang="pt-br">
<head>
    <link rel="stylesheet" href="style.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos livres</title>
</head>
<body>
    <nav class="navbar">
        <ul class="nav-list">
            <li class="logo"><a href="#">CS</a></li>
            <li class="cursoslivres"><a href="#">Cursos livres</a></li>
        </ul>
        <div class="rightNav">
            <button class="btncadastrar">Cadastre-se</button>
            <button class="btn btn-sm">Entrar</button>
        </div>
    </nav>
    <main>
        <div class="title"><h1>Cursos livres</h1></div>
        <section class="cards">
            <div class="cards-group">
                <button class="course-button">Matematica</button>
                <button class="course-button">Fisica</button>
                <button class="course-button">Quimica</button>
            </div>
            <div class="cards-group">
                <button class="course-button">Biologia</button>
                <button class="course-button">Português</button>
                <button class="course-button">Literatura</button>
            </div>
            <div class="cards-group">
                <button class="course-button">Redação</button>
                <button class="course-button">Historia</button>
                <button class="course-button">Geografia</button>
            </div>
            <div class="cards-group">
                <button class="course-button">Filosofia</button>
                <button class="course-button">Sociologia</button>
                <button class="course-button">Artes</button>
            </div>
        </section>
    </main>
    <script src="script.js"></script>
</body>
</html>
